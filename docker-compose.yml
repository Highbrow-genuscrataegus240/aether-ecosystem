version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: aether_postgres
    environment:
      POSTGRES_USER: aether_admin
      POSTGRES_PASSWORD: aether_password
      # This variable is executed by the init script
      POSTGRES_DB: aethersupply
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-dbs.sql:/docker-entrypoint-initdb.d/init-dbs.sql
    restart: unless-stopped

volumes:
  postgres_data:
